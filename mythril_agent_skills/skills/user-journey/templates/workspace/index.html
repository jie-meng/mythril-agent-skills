<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{TITLE}}</title>
  <link rel="stylesheet" href="assets/styles.css" />
  <script id="journey-data" type="application/json">{{JOURNEY_JSON}}</script>
  <script id="design-tokens" type="application/json">{{DESIGN_TOKENS_JSON}}</script>
</head>
<body>

  <header class="topbar" data-no-pan>
    <div id="topbar-title" class="topbar-title">{{TITLE}}</div>

    <div class="view-switcher" role="tablist" aria-label="View mode">
      <button id="view-canvas-btn"
              class="view-switcher-btn is-active"
              role="tab"
              aria-selected="true"
              data-view="canvas"
              title="Canvas overview (V)">Canvas</button>
      <button id="view-prototype-btn"
              class="view-switcher-btn"
              role="tab"
              aria-selected="false"
              data-view="prototype"
              title="Prototype click-through (P)">Prototype</button>
    </div>

    <div id="zoom-controls" class="topbar-zoom-group">
      <button id="zoom-out-btn" class="topbar-btn" title="Zoom out (−)">−</button>
      <button id="reset-btn" class="topbar-zoom" title="Reset zoom (0)">
        <span id="zoom-readout">100%</span>
      </button>
      <button id="zoom-in-btn" class="topbar-btn" title="Zoom in (+)">+</button>
    </div>

    <span class="topbar-divider"></span>
    <button id="fit-btn" class="topbar-btn" title="Fit to screen (F)">Fit</button>
    <button id="help-btn" class="topbar-btn" title="Show shortcuts (H)">?</button>
  </header>

  <div class="app-shell">
    <aside id="sidebar" class="sidebar" data-no-pan aria-label="Screen list">
      <div class="sidebar-search">
        <input id="sidebar-search-input"
               class="sidebar-search-input"
               type="search"
               placeholder="Search screens" />
      </div>
      <nav id="sidebar-stages" class="sidebar-stages" aria-label="Stages and screens"></nav>
    </aside>

    <main class="main-area">
      <!-- Canvas view (default) -->
      <div id="canvas-viewport" class="canvas-viewport view-pane is-active" data-view="canvas">
        <div id="canvas-world" class="canvas-world">
          <div id="canvas-headers"  class="canvas-headers"></div>
          <svg id="canvas-arrows"   class="canvas-arrows" xmlns="http://www.w3.org/2000/svg"></svg>
          <div id="canvas-stickies" class="canvas-stickies"></div>
          <div id="canvas-screens"  class="canvas-screens"></div>
        </div>
        <div id="minimap" class="minimap" data-no-pan aria-label="Minimap">
          <div id="minimap-canvas" class="minimap-canvas">
            <div id="minimap-viewport-rect" class="minimap-viewport-rect"></div>
          </div>
        </div>
      </div>

      <!-- Prototype view (single screen, click-through) -->
      <div id="prototype-viewport" class="prototype-viewport view-pane" data-view="prototype" hidden>
        <div id="prototype-breadcrumb" class="prototype-breadcrumb" aria-label="Navigation history"></div>
        <div id="prototype-stage" class="prototype-stage">
          <div id="prototype-frame" class="prototype-frame"></div>
        </div>
        <aside id="prototype-arrows-hint" class="prototype-arrows-hint" aria-label="Outgoing transitions"></aside>
      </div>
    </main>
  </div>

  <div id="help-overlay" class="help-overlay" hidden></div>

  <script src="assets/canvas.js"></script>
  <script src="assets/arrows.js"></script>
  <script src="assets/wireframe.js"></script>
  <script src="assets/view.js"></script>
  <script src="assets/sidebar.js"></script>
  <script src="assets/prototype.js"></script>
  <script src="assets/minimap.js"></script>
  <script src="assets/render.js"></script>
</body>
</html>
