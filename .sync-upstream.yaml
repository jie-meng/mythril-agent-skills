# Upstream sync configuration for forked repositories.
# Used by: python3 scripts/sync-upstream.py
#
# This file controls how skills and scripts are synced from the upstream
# mythril-agent-skills repository into your fork.

# The upstream repository URL.
upstream_repo: https://github.com/jie-meng/mythril-agent-skills.git

# The upstream branch to sync from.
upstream_branch: main

# Skills to exclude from syncing (your customized skills).
# Add skill directory names here to prevent them from being overwritten.
# Uncomment and edit the lines below as needed:
exclude_skills: []
#  - my-custom-skill
#  - jira
